<body>
  <script>
    // Back-compat: the portal used to use hash routing, so old shared links are
    // hash form (e.g. /#/hackathon). The router now reads location.pathname, so
    // rewrite any incoming #/path into a clean path before the app mounts.
    (function () {
      var h = location.hash;
      if (h && h.charAt(1) === '/') {        // only "#/..." app routes, not "#section"
        var rest = h.slice(1);               // "/hackathon?x=1"
        var q = rest.indexOf('?');
        var path = q >= 0 ? rest.slice(0, q) : rest;
        var hq = q >= 0 ? rest.slice(q) : '';
        history.replaceState({}, '', path + (location.search || hq || ''));
      }
    })();
  </script>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
