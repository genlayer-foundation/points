version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
      buildSettings:
        env:
          variables:
            # Add your API endpoint here after App Runner deployment
            VITE_API_URL: https://tally-backend.33qpgck0g28d0.us-east-1.cs.amazonlightsail.com
            VITE_APP_NAME: Tally
            VITE_VALIDATOR_RPC_URL: https://rpc.testnet-chain.genlayer.com
            VITE_VALIDATOR_CONTRACT_ADDRESS: 0x63Fa5E0bb10fb6fA98F44726C5518223F767687A
    customRules:
      - source: '</^[^.]+$|\.(?!(css|gif|ico|jpg|js|png|txt|svg|woff|woff2|ttf|map|json|webp)$)([^.]+$)/>'
        target: '/index.html'
        status: '200'
    # Backend is handled by App Runner, not Amplify
    # This configuration is for frontend-only deployment
