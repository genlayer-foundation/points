version: '3.8'

# Shared PostgreSQL container for local development.
# Used by all orca sessions — each session gets its own database.
#
# Start:  docker compose up -d db
# Stop:   docker compose down
# Status: docker compose ps
#
# Databases are created automatically by orca via orchestrator.yml env_substitutions.
# To create a database manually:
#   docker compose exec db createdb -U tally_user tally_<name>
# To create from template (instant clone of production snapshot):
#   docker compose exec db psql -U tally_user -c 'CREATE DATABASE "tally_<name>" TEMPLATE tally_template'

services:
  db:
    image: postgres:17
    container_name: tally-postgres
    environment:
      POSTGRES_DB: tally_main
      POSTGRES_USER: tally_user
      POSTGRES_PASSWORD: tally_password
    volumes:
      - tally_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  tally_pgdata:
