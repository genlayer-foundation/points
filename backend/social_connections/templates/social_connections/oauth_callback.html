<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{ platform|title }} OAuth</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f9fafb;
        }
        .container { text-align: center; padding: 2rem; }
        .message { color: #6b7280; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <p class="message" id="message">Closing...</p>
    </div>
    <script>
        (function() {
            var success = {{ success|lower }};
            var error = "{{ error|escapejs }}";
            var platform = "{{ platform|escapejs }}";

            var payload = {
                type: 'oauth_result',
                platform: platform,
                verified: success,
                error: error || ''
            };

            // Use window.opener.postMessage to communicate cross-origin with the original tab
            if (window.opener) {
                try {
                    window.opener.postMessage(payload, '*');
                } catch (e) {}
            }

            setTimeout(function() {
                window.close();
                // Fallback if window.close() is blocked
                document.getElementById('message').textContent = success
                    ? 'Account linked! You can close this tab.'
                    : (error === 'already_linked'
                        ? 'This account is already linked to another user. You can close this tab.'
                        : 'Something went wrong. You can close this tab.');
            }, 200);
        })();
    </script>
</body>
</html>
