name: Schedule Discord Role Sync on Main

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  dispatch-main:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch Discord role sync on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run sync-discord-roles.yml --ref main
