name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.12.0
          package-manager-cache: false

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 35

    defaults:
      run:
        working-directory: backend

    env:
      DJANGO_SETTINGS_MODULE: tally.test_settings
      SECRET_KEY: ci-only-django-secret-key
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      DATABASE_URL: ""
      CSRF_TRUSTED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      SIWE_DOMAIN: localhost
      VALIDATOR_RPC_URL: http://localhost
      ALLOWED_CIDR_NETS: 127.0.0.1/32
      RECAPTCHA_PUBLIC_KEY: 6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI
      RECAPTCHA_PRIVATE_KEY: 6LeIxAcTAAAAAGG-vFI1TnRWxMZNFuojJ4WifJWe
      RECAPTCHA_ALLOW_TEST_KEYS: "true"
      GITHUB_ENCRYPTION_KEY: oXf4yjCFpof8TTKIFuwb2Ie2BERopbplB_CnQGHfG64=
      SOCIAL_ENCRYPTION_KEY: oXf4yjCFpof8TTKIFuwb2Ie2BERopbplB_CnQGHfG64=

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip check

      - name: Check Django configuration
        run: python manage.py check

      - name: Check migrations are committed
        env:
          DJANGO_SETTINGS_MODULE: tally.settings
        run: python manage.py makemigrations --check --dry-run

      - name: Run backend tests
        run: python manage.py test --verbosity 1
