name: Sync Validators

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      target:
        description: 'API to target (schedule always hits prod)'
        type: choice
        options:
          - prod
          - dev
        default: prod

concurrency:
  group: sync-validators
  cancel-in-progress: false

permissions: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: cron-job
    timeout-minutes: 10
    steps:
      - name: Trigger Validator Sync
        env:
          BASE_URL: ${{ inputs.target == 'dev' && secrets.DEV_API_BASE_URL || secrets.API_BASE_URL }}
          TARGET: ${{ inputs.target || 'prod' }}
        run: |
          echo "Target: $TARGET"
          response=$(curl -sS --max-time 120 -w "\n%{http_code}" -X POST \
            -H "X-Cron-Token: ${{ secrets.CRON_SYNC_TOKEN }}" \
            "$BASE_URL/api/v1/validators/wallets/sync/")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "Response: $body"
          echo "HTTP Code: $http_code"

          if [ "$http_code" = "200" ] || [ "$http_code" = "202" ]; then
            echo "Sync triggered successfully"
          elif [ "$http_code" = "409" ]; then
            echo "Sync already in progress, skipping (not a failure)"
          else
            echo "Sync failed with status $http_code"
            exit 1
          fi
